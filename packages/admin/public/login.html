<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Commerce — Login</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">⚡ Prompt Commerce</div>
      <div class="tagline">Admin Panel</div>

      <div id="error" class="alert alert-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username"
                 placeholder="admin" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password"
                 placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;justify-content:center;">
          Sign in
        </button>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('pc_token')) {
      window.location.href = '/settings.html';
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');

      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || 'Invalid username or password.');
        }

        const { access_token } = await res.json();
        localStorage.setItem('pc_token', access_token);
        window.location.href = '/settings.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
